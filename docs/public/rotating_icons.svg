<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="100%" height="100%">
  <style>
    /* Главный контейнер: вращается вокруг центра SVG (160x160) */
    .icons-wrapper {
      transform-origin: 160px 160px;
      animation: rotate-wrapper 20s linear infinite;
    }

    /* Настройки для кликабельных областей */
    .icon-item {
      cursor: pointer;
    }

    /* Центры трансформации для каждой иконки */
    /* Иконка 1 (RPF) находится в правом нижнем углу, ее центр: 230, 230 */
    .icon-1 .icon-inner, 
    .icon-1 .icon-scale, 
    .icon-1 .img-wobble {
      transform-origin: 230px 230px;
    }
    
    /* Иконка 2 (RPT) находится в левом верхнем углу, ее центр: 90, 90 */
    .icon-2 .icon-inner, 
    .icon-2 .icon-scale, 
    .icon-2 .img-wobble {
      transform-origin: 90px 90px;
    }

    /* Контр-вращение: чтобы картинки не переворачивались вверх ногами */
    .icon-inner {
      animation: counter-rotate 20s linear infinite;
    }

    /* Анимация увеличения при наведении */
    .icon-scale {
      transition: transform 0.4s ease;
    }
    .icon-item:hover .icon-scale {
      transform: scale(1.2);
    }

    /* Эффект покачивания (wobble) и тени */
    .img-wobble {
      animation: tilt-wobble 4s ease-in-out infinite;
      will-change: transform, filter;
      transition: filter 0.4s ease;
    }

    /* Стили для первой иконки (RPF - Зеленая) */
    .icon-1 .img-wobble {
      filter: drop-shadow(0 0 25px rgba(73, 201, 99, 0.5));
    }
    .icon-item.icon-1:hover .img-wobble {
      filter: drop-shadow(0 0 40px rgba(73, 201, 99, 0.9));
    }

    /* Стили для второй иконки (RPT - Синяя) */
    .icon-2 .img-wobble {
      filter: drop-shadow(0 0 25px rgba(62, 168, 219, 0.5));
      animation-delay: -2.5s; /* Смещение покачивания для асинхронности */
    }
    .icon-item.icon-2:hover .img-wobble {
      filter: drop-shadow(0 0 40px rgba(62, 168, 219, 0.9));
    }

    /* Keyframes */
    @keyframes rotate-wrapper {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes counter-rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    @keyframes tilt-wobble {
      0% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
      100% { transform: rotate(-4deg); }
    }
  </style>

  <g class="icons-wrapper">
    
    <a href="https://modrinth.com/project/kW70KuE2" target="_blank" class="icon-item icon-2" title="Go to RPT Modrinth">
      <g class="icon-inner">
        <g class="icon-scale">
          <image href="https://github.com/Danrus1100/rtp-rpf-docs/blob/main/docs/public/512_icon2.png?raw=true" x="10" y="10" width="160" height="160" class="img-wobble" />
        </g>
      </g>
    </a>

    <a href="https://modrinth.com/project/zmAOqYcS" target="_blank" class="icon-item icon-1" title="Go to RPF Modrinth">
      <g class="icon-inner">
        <g class="icon-scale">
          <image href="https://github.com/Danrus1100/rtp-rpf-docs/blob/main/docs/public/512_icon.png?raw=true" x="150" y="150" width="160" height="160" class="img-wobble" />
        </g>
      </g>
    </a>

  </g>
</svg>
